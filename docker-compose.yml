services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      PORT: ${API_PORT:-3000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/pokemon_collections}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - mongo
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/test:/app/test

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src

volumes:
  mongo-data:
